<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMG Placements & Training - Explore Jobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { rmgBlue: '#003380', rmgOrange: '#FF6600', lightBlue: '#F0F5FF' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div id="nav-placeholder"></div>

    <main>
        <!-- Jobs Hero Section -->
        <section class="bg-lightBlue py-16 px-4 text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 mb-4">EXPLORE OPPORTUNITIES</h1>
            <p class="text-gray-600 text-lg max-w-2xl mx-auto">Find your dream job from the top companies across IT, Banking, Finance, and Manufacturing.</p>
        </section>

        <!-- Search & Filter Bar -->
        <section class="max-w-6xl mx-auto px-4 -mt-8">
            <div class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3 top-3 w-5 h-5 text-gray-400"></i>
                        <input type="text" placeholder="Job title, keywords..." class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rmgBlue focus:outline-none transition">
                    </div>
                    <div class="relative">
                        <i data-lucide="map-pin" class="absolute left-3 top-3 w-5 h-5 text-gray-400"></i>
                        <input type="text" placeholder="City or State" class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rmgBlue focus:outline-none transition">
                    </div>
                    <button class="bg-rmgBlue text-white font-bold py-3 px-6 rounded-lg hover:bg-blue-900 transition flex items-center justify-center gap-2">
                        <i data-lucide="search" class="w-5 h-5"></i> FIND JOBS
                    </button>
                </div>
            </div>
        </section>

        <!-- Job Listings Section -->
        <section class="py-16 max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-extrabold text-rmgBlue border-l-4 border-rmgBlue pl-4">RECENT OPENINGS</h2>
                <span class="text-sm text-gray-500 font-medium">Showing 4 of 145 Jobs</span>
            </div>
            <div class="space-y-4">
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm hover:shadow-md hover:border-rmgBlue transition-all group flex flex-col md:flex-row md:items-center justify-between gap-6">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 bg-gray-100 rounded-lg flex items-center justify-center font-bold text-gray-400 text-xs border border-gray-200">HDFC</div>
                        <div>
                            <h3 class="font-bold text-lg text-gray-900 group-hover:text-rmgBlue transition">Bank Executive</h3>
                            <div class="flex flex-wrap gap-x-4 gap-y-1 text-sm text-gray-500 mt-1">
                                <span class="flex items-center gap-1"><i data-lucide="building" class="w-3 h-3"></i> HDFC Bank</span>
                                <span class="flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i> Chennai, TN</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col md:items-end justify-between gap-2">
                        <span class="text-rmgBlue font-bold text-lg">₹2.4 - 3.0 LPA</span>
                        <button class="bg-rmgBlue text-white px-6 py-2 rounded-lg font-bold text-sm hover:bg-blue-900 transition">APPLY NOW</button>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm hover:shadow-md hover:border-rmgBlue transition-all group flex flex-col md:flex-row md:items-center justify-between gap-6">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 bg-gray-100 rounded-lg flex items-center justify-center font-bold text-gray-400 text-xs border border-gray-200">TVS</div>
                        <div>
                            <h3 class="font-bold text-lg text-gray-900 group-hover:text-rmgBlue transition">Production Trainee</h3>
                            <div class="flex flex-wrap gap-x-4 gap-y-1 text-sm text-gray-500 mt-1">
                                <span class="flex items-center gap-1"><i data-lucide="building" class="w-3 h-3"></i> TVS Motors</span>
                                <span class="flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i> Hosur, TN</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col md:items-end justify-between gap-2">
                        <span class="text-rmgBlue font-bold text-lg">₹1.8 - 2.4 LPA</span>
                        <button class="bg-rmgBlue text-white px-6 py-2 rounded-lg font-bold text-sm hover:bg-blue-900 transition">APPLY NOW</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../assets/js/main.js"></script>
</body>
</html>
