<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMG Placements & Training - Contact Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { rmgBlue: '#003380', rmgOrange: '#FF6600', lightBlue: '#F0F5FF' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div id="nav-placeholder"></div>

    <main>
        <!-- Contact Hero Section -->
        <section class="bg-lightBlue py-16 px-4 text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 mb-4">CONTACT US</h1>
            <p class="text-gray-600 text-lg max-w-2xl mx-auto">Have questions? We're here to help you find the right opportunity or talent.</p>
        </section>

        <!-- Contact Grid Section -->
        <section class="py-16 max-w-7xl mx-auto px-4">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
                <div class="space-y-10">
                    <h2 class="text-2xl font-extrabold text-rmgBlue border-l-4 border-rmgBlue pl-4 mb-8">GET IN TOUCH</h2>
                    <div class="space-y-6">
                        <div class="flex items-start gap-4 p-4 rounded-xl bg-white border border-gray-100 shadow-sm">
                            <div class="bg-blue-50 p-3 rounded-lg text-rmgBlue"><i data-lucide="map-pin"></i></div>
                            <div><h4 class="font-bold">Our Office</h4><p class="text-gray-600 text-sm">Yogiyar illam, Flat No - T3, Third Floor 2, Saligramam, Chennai - 93</p></div>
                        </div>
                        <div class="flex items-start gap-4 p-4 rounded-xl bg-white border border-gray-100 shadow-sm">
                            <div class="bg-blue-50 p-3 rounded-lg text-rmgBlue"><i data-lucide="phone"></i></div>
                            <div><h4 class="font-bold">Phone Support</h4><p class="text-gray-600 text-sm">90875 49000 / 90251 59000</p></div>
                        </div>
                        <div class="flex items-start gap-4 p-4 rounded-xl bg-white border border-gray-100 shadow-sm">
                            <div class="bg-blue-50 p-3 rounded-lg text-rmgBlue"><i data-lucide="mail"></i></div>
                            <div><h4 class="font-bold">Email Us</h4><p class="text-gray-600 text-sm">rmgplacements@gmail.com</p></div>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
                    <h2 class="text-2xl font-extrabold text-rmgBlue border-l-4 border-rmgBlue pl-4 mb-8">SEND US A MESSAGE</h2>
                    <form id="contact-form" class="space-y-5">
                        <input type="text" placeholder="Full Name" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rmgBlue focus:outline-none">
                        <input type="email" placeholder="Email Address" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rmgBlue focus:outline-none">
                        <textarea rows="5" placeholder="Your Message" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rmgBlue focus:outline-none"></textarea>
                        <button id="contact-btn" class="w-full bg-rmgBlue text-white font-bold py-4 rounded-lg hover:bg-blue-900 transition flex items-center justify-center gap-2">
    <i data-lucide="send"></i> SEND MESSAGE
</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../assets/js/main.js"></script>
    <script type="module">
    import { db } from '../assets/js/firebase-config.js';
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // We need to give your form an ID since it didn't have one
    // First, find the <form> tag in contact.html and add id="contact-form" to it.
    // Example: <form id="contact-form" class="space-y-5">

    document.getElementById('contact-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const name = e.target[0].value;
        const email = e.target[1].value;
        const message = e.target[2].value;

        try {
            // This creates a collection called "messages" in your Firestore
            await addDoc(collection(db, "messages"), {
                fullName: name,
                email: email,
                message: message,
                timestamp: new Date()
            });

            alert("Message sent successfully! We will get back to you soon.");
            e.target.reset(); // Clears the form
        } catch (error) {
            console.error(error);
            alert("Something went wrong. Please try again.");
        }
    });
</script>
<script>
    document.querySelector('form').addEventListener('submit', (e) => {
        e.preventDefault();
        const btn = document.getElementById('contact-btn');
        btn.textContent = '✓ Message Sent!';
        btn.classList.replace('bg-rmgBlue', 'bg-green-600');
        btn.disabled = true;
        setTimeout(() => {
            e.target.reset();
            btn.innerHTML = '<i data-lucide="send"></i> SEND MESSAGE';
            btn.classList.replace('bg-green-600', 'bg-rmgBlue');
            btn.disabled = false;
            if (window.lucide) lucide.createIcons();
        }, 3000);
    });
</script>
</body>
</html>
