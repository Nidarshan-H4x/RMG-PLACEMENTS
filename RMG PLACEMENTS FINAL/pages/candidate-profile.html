<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | RMG Placements</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { rmgBlue: '#003380', rmgOrange: '#FF6600', lightBlue: '#F0F5FF' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-rmgBlue text-white flex flex-col hidden md:flex">
        <div class="p-6 text-2xl font-black border-b border-blue-800">RMG Placements</div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="candidate-dashboard.html" class="block px-4 py-3 hover:bg-blue-800 rounded-lg transition">Dashboard</a>
            <a href="candidate-jobs.html" class="block px-4 py-3 hover:bg-blue-800 rounded-lg transition">Find Jobs</a>
            <!-- Profile is active -->
            <a href="candidate-profile.html" class="block px-4 py-3 bg-blue-800 rounded-lg font-semibold">My Profile</a>
        </nav>
        <div class="p-4 border-t border-blue-800">
            <button id="logout-btn" class="w-full text-left px-4 py-2 text-red-300 hover:text-red-100 font-semibold transition">Log Out</button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="bg-white shadow-sm p-6">
            <h1 class="text-2xl font-bold text-gray-800">My Profile</h1>
        </header>

        <div class="p-8 max-w-3xl">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
                <form id="profile-form" class="space-y-4">
                    <div>
                        <label class="text-sm font-semibold text-gray-600">Full Name</label>
                        <input type="text" id="prof-name" class="w-full px-4 py-2 mt-1 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rmgBlue focus:outline-none" disabled>
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-gray-600">Email Address</label>
                        <input type="email" id="prof-email" class="w-full px-4 py-2 mt-1 rounded-lg border border-gray-300 bg-gray-50" disabled>
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-gray-600">Mobile Number</label>
                        <input type="tel" id="prof-phone" class="w-full px-4 py-2 mt-1 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rmgBlue focus:outline-none" disabled>
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-gray-600">Highest Qualification</label>
                        <input type="text" id="prof-qual" class="w-full px-4 py-2 mt-1 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rmgBlue focus:outline-none" disabled>
                    </div>
                    <!-- We will add the logic to make these editable later! -->
                </form>
            </div>
        </div>
    </main>

    <!-- FIREBASE LOGIC -->
    <script type="module">
        import { auth, db } from '../assets/js/firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "candidate-login.html";
                return;
            }

            // Fetch user data and fill the form
            const userDocSnap = await getDoc(doc(db, "users", user.uid));
            if (userDocSnap.exists()) {
                const userData = userDocSnap.data();
                document.getElementById('prof-name').value = userData.fullName || "";
                document.getElementById('prof-email').value = userData.email || "";
                document.getElementById('prof-phone').value = userData.phone || "";
                document.getElementById('prof-qual').value = userData.qualification || "";
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = "candidate-login.html";
        });
    </script>
</body>
</html>
