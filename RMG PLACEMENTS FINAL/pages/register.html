<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMG Placements & Training - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { rmgBlue: '#003380', rmgOrange: '#FF6600', lightBlue: '#F0F5FF' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div id="nav-placeholder"></div>

    <main>
        <section class="bg-lightBlue py-12 px-4">
            <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl border-t-4 border-rmgBlue p-8 mt-8">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-extrabold text-rmgBlue">Create Your Account</h1>
                    <p class="text-gray-500 text-sm mt-2">Join RMG to access jobs, training, and more.</p>
                </div>
                
                <form id="register-form" class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-sm font-semibold text-gray-700">I am a:</label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="cursor-pointer">
                                <input type="radio" name="role" value="candidate" class="peer sr-only" checked>
                                <div class="border-2 border-gray-200 rounded-lg p-3 text-center text-sm font-bold text-gray-600 peer-checked:border-rmgBlue peer-checked:text-rmgBlue peer-checked:bg-blue-50 transition">Candidate</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="role" value="employer" class="peer sr-only">
                                <div class="border-2 border-gray-200 rounded-lg p-3 text-center text-sm font-bold text-gray-600 peer-checked:border-rmgOrange peer-checked:text-rmgOrange peer-checked:bg-orange-50 transition">Employer</div>
                            </label>
                        </div>
                    </div>

                    <input type="text" id="reg-name" placeholder="Full Name" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rmgBlue focus:outline-none" required>
<input type="email" id="reg-email" placeholder="Email Address" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rmgBlue focus:outline-none" required>
<input type="tel" id="reg-phone" placeholder="Mobile Number" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rmgBlue focus:outline-none" required>
<input type="password" id="reg-password" placeholder="Create Password" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rmgBlue focus:outline-none" required>
<input type="password" id="reg-confirm" placeholder="Confirm Password" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rmgBlue focus:outline-none" required>
<p id="pass-error" class="text-red-500 text-xs hidden">❌ Passwords do not match.</p>
<input type="text" id="reg-qual" placeholder="Highest Qualification" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rmgBlue focus:outline-none" required>
                    
                    <div class="text-xs text-gray-500 text-center pt-2">
                        By registering, you agree to our <a href="#" class="text-rmgBlue font-bold underline">Terms & Conditions</a>
                    </div>

                    <button type="submit" class="w-full bg-rmgBlue text-white font-bold py-3 rounded-lg mt-4 hover:bg-blue-900 transition shadow-lg">REGISTER NOW</button>
                </form>

                <p class="text-center text-sm text-gray-600 mt-6">
                    Already have an account? <a id="login-link" href="candidate-login.html" class="text-rmgBlue font-bold hover:underline">Login here</a>
                </p>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../assets/js/main.js"></script>
    <!-- Change your script tag to type="module" -->
<script type="module">
    import { auth, db } from '../assets/js/firebase-config.js';
    import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const role          = document.querySelector('input[name="role"]:checked').value;
    const name          = document.getElementById('reg-name').value;
    const email         = document.getElementById('reg-email').value;
    const phone         = document.getElementById('reg-phone').value;
    const password      = document.getElementById('reg-password').value;
    const confirm       = document.getElementById('reg-confirm').value;
    const qualification = document.getElementById('reg-qual').value;

        // ✅ Password match check
        const errorMsg = document.getElementById('pass-error');
        if (password !== confirm) {
            errorMsg.classList.remove('hidden');
            return;
        }
        errorMsg.classList.add('hidden');

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            await setDoc(doc(db, "users", user.uid), {
                fullName: name,
                email: email,
                phone: phone,
                role: role,
                qualification: qualification,
                createdAt: new Date()
            });

            alert("Registration successful! Welcome to RMG.");
            window.location.href = role === 'employer'
                ? 'employer-login.html'
                : 'candidate-login.html';

        } catch (error) {
            console.error(error);
            alert("Error: " + error.message);
        }
    });
</script>
<script>
    document.querySelectorAll('input[name="role"]').forEach(radio => {
        radio.addEventListener('change', () => {
            document.getElementById('login-link').href =
                radio.value === 'employer'
                    ? 'employer-login.html'
                    : 'candidate-login.html';
        });
    });
</script>
</body>
</html>
