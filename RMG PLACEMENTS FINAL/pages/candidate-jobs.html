<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Jobs | RMG Placements</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { rmgBlue: '#003380', rmgOrange: '#FF6600', lightBlue: '#F0F5FF' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-rmgBlue text-white flex flex-col hidden md:flex">
        <div class="p-6 text-2xl font-black border-b border-blue-800">RMG Placements</div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="candidate-dashboard.html" class="block px-4 py-3 hover:bg-blue-800 rounded-lg transition">Dashboard</a>
            <!-- Jobs is active -->
            <a href="candidate-jobs.html" class="block px-4 py-3 bg-blue-800 rounded-lg font-semibold">Find Jobs</a>
            <a href="candidate-profile.html" class="block px-4 py-3 hover:bg-blue-800 rounded-lg transition">My Profile</a>
        </nav>
        <div class="p-4 border-t border-blue-800">
            <button id="logout-btn" class="w-full text-left px-4 py-2 text-red-300 hover:text-red-100 font-semibold transition">Log Out</button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="bg-white shadow-sm p-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800">Available Jobs</h1>
        </header>

        <div class="p-8">
            <div id="jobs-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- We will load jobs from Firebase here! For now, it's a placeholder -->
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                    <h3 class="font-bold text-lg">Software Developer (Placeholder)</h3>
                    <p class="text-gray-600">Tech Corp — Chennai, TN</p>
                    <p class="text-rmgBlue font-bold mt-2">₹4.0 - 6.0 LPA</p>
                    <button class="mt-4 w-full bg-rmgBlue text-white py-2 rounded-lg font-semibold">APPLY NOW</button>
                </div>
            </div>
        </div>
    </main>

    <!-- FIREBASE LOGIC -->
    <script type="module">
        import { auth, db } from '../assets/js/firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "candidate-login.html";
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = "candidate-login.html";
        });
    </script>
</body>
</html>
