<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Login - RMG Placements</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { rmgBlue: '#003380', rmgOrange: '#FF6600', lightBlue: '#F0F5FF' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div id="nav-placeholder"></div>

    <main>
        <section class="bg-lightBlue py-12 px-4">
            <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl border-t-4 border-rmgOrange p-8 mt-8">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-extrabold text-rmgOrange">Employer Portal</h1>
                    <p class="text-gray-500 text-sm mt-2">Login to manage your job postings and hire talent.</p>
                </div>
                
                <form id="employer-login-form" class="space-y-4">
                    <input type="email" placeholder="Company Email" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rmgOrange focus:outline-none" required>
                    <input type="password" placeholder="Password" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rmgOrange focus:outline-none" required>
                    
                    <div class="flex justify-between items-center text-sm">
                        <label class="flex items-center gap-2 text-gray-600">
                            <input type="checkbox" class="rounded text-rmgOrange focus:ring-rmgOrange">
                            Remember me
                        </label>
                        <a href="#" class="text-rmgOrange font-semibold hover:underline">Forgot Password?</a>
                    </div>

                    <button type="submit" class="w-full bg-rmgOrange text-white font-bold py-3 rounded-lg mt-4 hover:bg-orange-700 transition shadow-lg">EMPLOYER LOGIN</button>
                </form>

                <p class="text-center text-sm text-gray-600 mt-6">
                    New to RMG? <a href="register.html" class="text-rmgOrange font-bold hover:underline">Register your company</a>
                </p>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../assets/js/main.js"></script>
    <script type="module">
    import { auth } from '../assets/js/firebase-config.js';
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    document.getElementById('employer-login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = e.target[0].value;
        const password = e.target[1].value;

        try {
            await signInWithEmailAndPassword(auth, email, password);
            alert("Employer Login successful!");
            // Redirect to the company portal/dashboard (you can create this page later)
            window.location.href = "employer-dashboard.html"; 
        } catch (error) {
            alert("Invalid employer credentials. Please try again.");
        }
    });
</script>
</body>
</html>
